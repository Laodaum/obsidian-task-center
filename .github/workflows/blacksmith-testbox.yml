name: Blacksmith Testbox

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  hydrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OBSIDIAN_VERSIONS: latest/latest
      WDIO_MAX_INSTANCES: "1"

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Xvfb + Electron Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libnss3 \
            libxi6 \
            libxss1 \
            libgbm1 \
            libgtk-3-0t64 \
            libasound2t64

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin once during hydration
        run: pnpm run build
