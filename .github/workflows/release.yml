# US-601 ~ US-605 — auto release on strict semver tag push.
# Maintainer flow:
#   pnpm version minor   # bumps package.json + (via the `version` script)
#                        # syncs manifest.json + versions.json, creates the tag
#   git push origin main --follow-tags
#
# This workflow then runs the pre-flight gate (US-602) and only on full
# pass builds + uploads the three Obsidian-standard assets to a fresh
# GitHub Release with auto-generated, conventional-commit-grouped notes
# (US-604, US-605). Build artifacts are NEVER committed back to main.
name: Release

on:
  push:
    tags:
      # US-601: strict semver only — no `v` prefix, no pre-release suffix.
      # Anything else (e.g. `v1.0.0`, `1.0.0-beta`) is ignored, not failed.
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  preflight:
    name: Pre-flight gate (US-602)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Relax AppArmor userns restriction for Electron
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Install Xvfb + Electron Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            xdg-utils \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libcups2t64 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0t64 \
            libnss3 \
            libnspr4 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxkbcommon0 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            libgbm1 \
            libgtk-3-0t64 \
            libasound2t64
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Ordered for fastest failure: typecheck < lint < unit < e2e.
      # Any single step failing aborts the workflow before the release
      # job runs — that's the whole point of US-602 ("build 通过 != 可发版").
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Unit tests
        run: pnpm run test:unit
      # E2E uses wdio-obsidian-service, which downloads Obsidian binaries
      # via obsidian-launcher. Beta versions need OBSIDIAN_EMAIL — pin to
      # `latest/latest` to skip Insiders requirement on CI runners.
      - name: E2E tests
        env:
          OBSIDIAN_VERSIONS: latest/latest
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pnpm run test:e2e:ci

  release:
    name: Build + GitHub Release (US-601, US-603, US-604, US-605)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the conventional-commit grouping can
          # diff this tag against the prior tag.
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Auto-sync: if the tag version doesn't match manifest.json (e.g. someone
      # pushed the tag directly without running `pnpm version`), update
      # package.json / manifest.json / versions.json to match the tag, then
      # commit the fix back to main so the repo stays consistent.
      - name: Auto-sync version files to tag
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$TAG_VERSION" = "$MANIFEST_VERSION" ]; then
            echo "Version OK: $TAG_VERSION — no sync needed."
          else
            echo "Auto-syncing $MANIFEST_VERSION → $TAG_VERSION"
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              pkg.version = process.argv[1];
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            " "$TAG_VERSION"
            node version-bump.mjs
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json manifest.json versions.json
            git commit -m "chore(release): bump version files to ${TAG_VERSION} [skip ci]"
            git push origin HEAD:main
            echo "Pushed version-sync commit to main."
          fi

      - name: Build (produces main.js)
        run: pnpm run build

      # US-606: generate GitHub artifact attestations for the exact
      # release assets before uploading them. GitHub matches release assets
      # by digest, so consumers can verify provenance with `gh attestation`.
      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      # US-604: release notes. Strategy:
      #   - find previous semver tag (skip the current one)
      #   - git log between tags, grouped by conventional commit prefix
      #   - emoji-headed sections for human readability
      #   - fallback "Other" bucket for non-conventional commits
      - name: Generate conventional-commit grouped release notes
        id: notes
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --list --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG_VERSION}$" | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            HEADER="🎉 First tagged release."
          else
            RANGE="${PREV_TAG}..HEAD"
            HEADER="Changes since \`${PREV_TAG}\`."
          fi
          {
            echo "$HEADER"
            echo ""
            for entry in \
              "feat:✨ Features" \
              "fix:🐛 Fixes" \
              "refactor:♻️ Refactors" \
              "perf:⚡ Performance" \
              "docs:📝 Docs" \
              "test:🧪 Tests" \
              "chore:🧹 Chores" \
              "ci:⚙️ CI"
            do
              prefix="${entry%%:*}"
              header="${entry#*:}"
              section=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" | grep -iE "^- ${prefix}(\(|:)" || true)
              if [ -n "$section" ]; then
                echo "## $header"
                echo "$section"
                echo ""
              fi
            done
            other=$(git log "$RANGE" --no-merges --pretty=format:"- %s (%h)" | grep -ivE "^- (feat|fix|refactor|perf|docs|test|chore|ci)(\(|:)" || true)
            if [ -n "$other" ]; then
              echo "## Other"
              echo "$other"
              echo ""
            fi
          } > release-notes.md
          echo "release-notes.md ready ($(wc -l < release-notes.md) lines)"

      # US-601 + US-605: create GitHub Release with the three Obsidian
      # standard assets. NOT zipped — Obsidian community plugin store
      # downloads each file individually.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_VERSION" \
            --title "$TAG_VERSION" \
            --notes-file release-notes.md \
            main.js manifest.json styles.css
