name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test:unit
      - run: pnpm run build

      - name: Install Xvfb + Electron Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgtk-3-0t64 libnss3 libasound2t64
          echo 'kernel.apparmor_restrict_unprivileged_userns=0' | sudo tee /etc/sysctl.d/99-apparmor-userns.conf
          sudo sysctl --system

      - run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pnpm run test:e2e:ci
        env:
          CI: "true"
          GITHUB_ACTIONS: "true"
          OBSIDIAN_VERSIONS: "latest/latest"
          WDIO_MAX_INSTANCES: 1

      - name: Generate release notes
        id: notes
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --list --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG_VERSION}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            git log --oneline --no-decorate "${PREV_TAG}.." | \
              sed 's/^[0-9a-f]\{7,9\} //' > /tmp/release-notes.md
          else
            echo "Initial release" > /tmp/release-notes.md
          fi
          echo "path=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - uses: actions/attest@v4
        id: attest
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            main.js
            manifest.json
            styles.css
