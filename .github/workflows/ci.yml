name: CI

# CI runs on PRs and main pushes — same pre-flight gate as tag releases,
# without publishing assets.
# Tag pushes are handled by .github/workflows/release.yml (US-601~605),
# which repeats this gate before creating a GitHub Release.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Relax AppArmor userns restriction for Electron
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Install Xvfb + Electron Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            xauth \
            xdg-utils \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcairo2 \
            libcups2t64 \
            libdbus-1-3 \
            libgdk-pixbuf2.0-0 \
            libglib2.0-0t64 \
            libnss3 \
            libnspr4 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxkbcommon0 \
            libxrandr2 \
            libxss1 \
            libxtst6 \
            libgbm1 \
            libgtk-3-0t64 \
            libasound2t64
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck
      - name: Lint
        run: pnpm run lint
      - name: Unit tests
        run: pnpm run test:unit
      - name: E2E tests
        env:
          OBSIDIAN_VERSIONS: latest/latest
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pnpm run test:e2e
