name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test:unit
      - run: pnpm run build

      - name: Install Xvfb + Electron Linux deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xvfb libgtk-3-0t64 libnss3 libasound2t64
          echo 'kernel.apparmor_restrict_unprivileged_userns=0' | sudo tee /etc/sysctl.d/99-apparmor-userns.conf
          sudo sysctl --system

      - run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            pnpm run test:e2e:ci
        env:
          CI: "true"
          GITHUB_ACTIONS: "true"
          OBSIDIAN_VERSIONS: "latest/latest"
          WDIO_MAX_INSTANCES: 1
